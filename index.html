<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRASHBUSTER WIKI</title>
    <link rel="stylesheet" href="styles.css">
    
    <style>
        
        body {
            opacity: 0;
            transition: opacity 0.9s ease-in-out;
        }
        body.visible {
            opacity: 1;
        }

        .hero {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 80px 15px 40px;
            position: relative;
            overflow: hidden;
            background: radial-gradient(circle at center, #1a0033 0%, #0a001a 100%);
        }

        .crashbuster-logo {
            width: clamp(110px, 35vw, 180px);
            margin-bottom: 20px;
            animation: bugFloat 4s ease-in-out infinite;
        }

        .game-title {
            font-size: clamp(2.2rem, 8vw, 3.5rem);
            color: #bb86fc;
            text-shadow: 0 0 25px #bb86fc, 0 0 50px rgba(187,134,252,0.7);
            margin: 10px 0 30px 0;
            letter-spacing: 5px;
        }

        .tagline .line1,
        .tagline .line2 {
            font-size: clamp(1.3rem, 5.5vw, 2.2rem);
            color: #d7aaff;
            text-shadow: 0 0 20px #bb86fc;
            margin: 8px 0;
            line-height: 1.1;
        }

        .learn-btn {
            padding: 16px 55px;
            font-size: clamp(1.1rem, 4.5vw, 1.4rem);
            min-width: 220px;
            margin-top: 20px;
            background: linear-gradient(90deg, #8b00ff, #bb86fc);
            color: white;
            border: none;
            border-radius: 50px;
            text-decoration: none;
            box-shadow: 0 0 35px rgba(187,134,252,0.8);
            transition: all 0.4s ease;
        }

        .learn-btn:hover {
            transform: scale(1.08);
        }

        @keyframes bugFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-12px); }
        }

        /* Slow down heavy animations on mobile */
        @media (max-width: 768px) {
            .hero::after, .hero .laser2 {
                animation-duration: 15s;
            }
        }
    </style>

       
    <div class="retro-bg">
</head>
<body class="index-page">

    <section class="hero">
        <img src="assets/crashbuster-logo.png" 
             alt="CrashBuster Logo" 
             class="crashbuster-logo">

        <h2 class="game-title">CRASHBUSTER WIKI</h2>

        <div class="tagline">
            <p class="line1">IF YOU WANT TO CRASH MY SYSTEM</p>
            <p class="line2">GET READY TO BE BUSTED!</p>
        </div>

        <a href="info.html" class="learn-btn">START</a>
    </section>

    <script>
        window.addEventListener('load', () => {
            document.body.classList.add('visible');
        });
    </script>
</body>
</html>
