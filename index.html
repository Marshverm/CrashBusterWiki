<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRASHBUSTER WIKI</title>
    <link rel="stylesheet" href="styles.css">
    
    <style>
        /* Clean Center Fade-in (no upward movement) */
        body {
            opacity: 0;
            transition: opacity 0.9s ease-in-out;
        }

        body.visible {
            opacity: 1;
        }

        /* Hero Section with Retro Animated Background */
        .hero {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 0 20px;
            position: relative;
            overflow: hidden;
            background: radial-gradient(circle at center, #1a0033 0%, #0a001a 100%);
        }

        /* Retro Grid + Laser Background Layer */
        .hero::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                linear-gradient(rgba(187, 134, 252, 0.08) 1px, transparent 1px),
                linear-gradient(90deg, rgba(187, 134, 252, 0.08) 1px, transparent 1px);
            background-size: 60px 60px;
            animation: gridMove 25s linear infinite;
            pointer-events: none;
            z-index: 1;
        }

        .hero::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(
                90deg,
                transparent 0%,
                rgba(187, 134, 252, 0.15) 48%,
                rgba(215, 170, 255, 0.25) 50%,
                rgba(187, 134, 252, 0.15) 52%,
                transparent 100%
            );
            animation: laserShoot 8s linear infinite;
            pointer-events: none;
            z-index: 2;
        }

        .hero .laser2 {
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(
                90deg,
                transparent 0%,
                rgba(255, 100, 255, 0.2) 49%,
                rgba(255, 200, 255, 0.35) 50%,
                rgba(255, 100, 255, 0.2) 51%,
                transparent 100%
            );
            animation: laserShoot 4.5s linear infinite;
            animation-delay: 3s;
            pointer-events: none;
            z-index: 2;
        }

        @keyframes gridMove {
            0% { background-position: 0 0; }
            100% { background-position: -120px -120px; }
        }

        @keyframes laserShoot {
            0% { transform: translateX(-100%); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateX(300%); opacity: 0; }
        }

        .game-title {
            font-size: 56px;
            color: #bb86fc;
            text-shadow: 0 0 25px #bb86fc,
                         0 0 50px rgba(187, 134, 252, 0.7);
            margin: 15px 0 60px 0;
            letter-spacing: 10px;
            font-weight: 700;
            z-index: 3;
            position: relative;
        }

        .tagline {
            margin-bottom: 90px;
            z-index: 3;
            position: relative;
        }

        .tagline .line1 {
            font-size: 44px;
            color: #d7aaff;
            text-shadow: 0 0 20px #bb86fc;
            margin: 0 0 25px 0;
            line-height: 1.05;
            font-weight: 600;
        }

        .tagline .line2 {
            font-size: 44px;
            color: #d7aaff;
            text-shadow: 0 0 20px #bb86fc;
            margin: 0;
            line-height: 1.05;
            font-weight: 600;
        }

        .crashbuster-logo {
            width: 180px;
            height: auto;
            margin-bottom: 20px;
            z-index: 3;
            position: relative;
            animation: bugFloat 3s ease-in-out infinite;
        }

        @keyframes bugFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-18px); }
        }

        .learn-btn {
            padding: 18px 70px;
            font-size: 24px;
            background: linear-gradient(90deg, #8b00ff, #bb86fc);
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            box-shadow: 0 0 35px rgba(187, 134, 252, 0.8);
            transition: all 0.4s ease;
            font-weight: 600;
            z-index: 3;
            position: relative;
        }

        .learn-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 0 50px rgba(187, 134, 252, 1);
        }
    </style>
</head>
<body class="index-page">

    <section class="hero">
        <img src="assets/crashbuster-logo.png" 
             alt="CrashBuster Logo" 
             class="crashbuster-logo">

        <h2 class="game-title">CRASHBUSTER WIKI</h2>

        <div class="tagline">
            <p class="line1">IF YOU WANT TO CRASH MY SYSTEM</p>
            <p class="line2">GET READY TO BE BUSTED!</p>
        </div>

        <a href="info.html" class="learn-btn">START</a>
    </section>

    <!-- Fade-in Script -->
    <script>
        window.addEventListener('load', () => {
            document.body.classList.add('visible');
        });
    </script>

</body>
</html>
